name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}

      # Hosting via the official action (works with the SA's Hosting role and
      # does NOT need the serviceusage preflight the CLI requires). It can report
      # a benign "current active version" 400 on unchanged content, so tolerate it.
      - name: Deploy to Firebase Hosting
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_LOGIN_FDCF7 }}
          channelId: live
          projectId: simple-login-fdcf7

      # Firestore/Storage rules via CLI. This needs the SA to have
      # serviceusage.serviceUsageConsumer (+ firebaserules.admin, datastore.indexAdmin)
      # on the SAME service account as the secret above. Until that's in effect it
      # warns instead of failing the run; storage also requires Storage to be enabled.
      - name: Deploy Firestore and Storage rules
        if: ${{ always() }}
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy --only firestore:rules,firestore:indexes,storage --project simple-login-fdcf7 --non-interactive \
            || echo "::warning::Firestore/Storage rules deploy failed — verify the IAM roles are on the service account in FIREBASE_SERVICE_ACCOUNT_SIMPLE_LOGIN_FDCF7, and that Storage is enabled."
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_LOGIN_FDCF7 }}
