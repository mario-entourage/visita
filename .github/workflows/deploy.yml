name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web export
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}

      # Hosting via the official action — works with the SA's Hosting role without
      # the granular project/serviceusage permissions the CLI requires. Tolerate the
      # benign "current active version" 400 it emits on unchanged content.
      - name: Deploy to Firebase Hosting
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_LOGIN_FDCF7 }}
          channelId: live
          projectId: simple-login-fdcf7

      # Firestore (and later Storage) rules via the CLI. Non-blocking: it currently
      # warns because the SA still lacks `firebase.projects.get` (grant the single
      # role "Firebase Admin" / roles/firebase.admin to the github-action SA to
      # finish enabling auto-deploy — serviceusage is already solved via the quota
      # project env below). Rules are already live in prod and rarely change.
      - name: Deploy Firestore rules and indexes
        if: ${{ always() }}
        continue-on-error: true
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          export GOOGLE_CLOUD_QUOTA_PROJECT=simple-login-fdcf7
          export GOOGLE_CLOUD_PROJECT=simple-login-fdcf7
          npx firebase-tools deploy --only firestore:rules,firestore:indexes --project simple-login-fdcf7 --non-interactive \
            || echo "::warning::Firestore rules/indexes auto-deploy not active yet — grant the github-action SA the 'Firebase Admin' role to enable it. Rules remain deployable manually."
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIMPLE_LOGIN_FDCF7 }}
